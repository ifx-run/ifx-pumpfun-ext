# Use config.toml OR config.json — not both. If both exist, config.toml wins.

[server]
host = "127.0.0.1"
port = 8787

[solana]
rpc_url = "https://api.mainnet-beta.solana.com"
commitment = "confirmed"

[ifx]
program_id = "ifxmwWVVZDmXN2DUVf7wtJYCXTRY4QsL5rzmNkXzxbj"
public_frames = [
  "6RNv1eQ7fogEW7R1QGg6dAiddEefGfYgJVtjpvgENtdn",
]

[pump]
usdc_mint = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
native_mint = "So11111111111111111111111111111111111111112"

[priority_fee]
default_tier = "medium"

[priority_fee.low]
micro_lamports = 1_000
compute_unit_limit = 400_000

[priority_fee.medium]
micro_lamports = 10_000
compute_unit_limit = 500_000

[priority_fee.high]
micro_lamports = 50_000
compute_unit_limit = 600_000

# Platform fee — quote only (SOL / USDC). Receive-only; pubkey suffices (pre-create USDC ATA for USDC pairs).
[service_fee]
bps = 5
pubkey = "REPLACE_WITH_FEE_RECIPIENT_PUBKEY"

# SOL-quote gas/rent sponsor — separate from fee recipient (may use the same wallet).
[sponsor]
enabled = false
pubkey = "REPLACE_WITH_SPONSOR_PUBKEY"
keypair_path = "./keys/sponsor.json"
min_user_sol_lamports = 5_000_000
repay_buffer_percent = 10
estimated_ata_rent_lamports = 2_039_280
estimated_tx_fee_lamports = 15_000

[quote]
debounce_ms = 300
default_slippage_bps = 100

rpc_cache_ttl_ms = 2_000
