# Copy to config.toml and edit. Or use config.json — use one format only.

[server]
host = "127.0.0.1"
port = 8787

[solana]
rpc_url = "https://api.mainnet-beta.solana.com"
commitment = "confirmed"
# On-chain address lookup tables — every build compiles a v0 tx with these ALTs.
address_lookup_tables = [
  # "YourAltPubkey...",
]

[ifx]
program_id = "ifxmwWVVZDmXN2DUVf7wtJYCXTRY4QsL5rzmNkXzxbj"
public_frames = [
  "6RNv1eQ7fogEW7R1QGg6dAiddEefGfYgJVtjpvgENtdn",
]

[pump]
usdc_mint = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
native_mint = "So11111111111111111111111111111111111111112"

[priority_fee]
default_tier = "medium"

[priority_fee.low]
micro_lamports = 1_000
compute_unit_limit = 400_000

[priority_fee.medium]
micro_lamports = 10_000
compute_unit_limit = 500_000

[priority_fee.high]
micro_lamports = 50_000
compute_unit_limit = 600_000

[service_fee]
bps = 5
pubkey = "YourFeeRecipientPubkey..."

[sponsor]
enabled = false
pubkey = "YourSponsorPubkey..."
keypair_path = "./keys/sponsor.json"
repay_buffer_percent = 10

[quote]
debounce_ms = 300
default_slippage_bps = 100

rpc_cache_ttl_ms = 2_000
